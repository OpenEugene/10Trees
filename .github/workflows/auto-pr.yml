name: Auto PR with Copilot Review

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
        
          if [ -z "$EXISTING_PR" ]; then
            TITLE=$(echo "$BRANCH" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2)); print}')
            PR_URL=$(gh pr create \
              --title "$TITLE" \
              --body "Auto-created PR for branch \`$BRANCH\`." \
              --base main)
            PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
            echo "PR #$PR_NUMBER created for branch: $BRANCH"
          else
            PR_NUMBER="$EXISTING_PR"
            echo "PR #$PR_NUMBER already exists for branch: $BRANCH"
          fi
          
          # Request Copilot review via API          
          gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers \
            --method POST \
            -f 'reviewers[]=copilot' || echo "Copilot review request failed (may not be enabled on this repo)"
